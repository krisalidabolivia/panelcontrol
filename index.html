<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Repertorio Krisálida</title>

    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

    <!-- Fondo -->
    <div class="background"></div>

    <!-- Encabezado -->
    <header>

        <div class="logo">

            <!-- Luego colocaremos el logo -->
            <img src="assets/img/logo.png" alt="Krisálida">

            <div>

                <h1>REPERTORIO</h1>
                <h2>KRISÁLIDA</h2>

            </div>

        </div>

    </header>

    <!-- Contenido -->
    <main>

    <!-- =======================
         DASHBOARD
    ======================== -->

    <section id="inicio">

        <div class="hero">

            <h1>Repertorio Musical</h1>

            <p>

                Selecciona un repertorio para comenzar

            </p>

        </div>

        <div class="categorias">

            <button class="categoria" data-cat="villera">

                <div class="icono">🎵</div>

                <span>Villera</span>

                <small>Abrir repertorio</small>

            </button>

            <button class="categoria" data-cat="con_sabor">

                <div class="icono">🎺</div>

                <span>Cumbia con Sabor</span>

                <small>Abrir repertorio</small>

            </button>

            <button class="categoria" data-cat="chicha_surena">

                <div class="icono">🎸</div>

                <span>Chicha Sureña</span>

                <small>Abrir repertorio</small>

            </button>

            <button class="categoria" data-cat="folclore">

                <div class="icono">🪘</div>

                <span>Folclore</span>

                <small>Abrir repertorio</small>

            </button>

            <button class="categoria" data-cat="clasica">

                <div class="icono">🎼</div>

                <span>Clásica</span>

                <small>Abrir repertorio</small>

            </button>

        </div>

    </section>

    <!-- =======================
         REPERTORIO
    ======================== -->

    <section id="repertorio" class="oculto">

        <div class="barra">

            <div class="izquierda">

                <button id="volver">

                    ← Inicio

                </button>

                <h2 id="tituloRepertorio"></h2>

            </div>

            <div class="acciones-superiores">


                <button id="btnImagen">

                    🖼 Imagen

                </button>

                <button id="btnPDF">

                    📄 PDF

                </button>

                <button id="btnJSON">

                    💾 JSON

                </button>

                <button id="agregarCancion">

                    ➕ Nueva

                </button>

            </div>

        </div>

        <div class="contenido-repertorio">



    <div id="listaCanciones"></div>

    <aside id="panelSetlist">

        <h2>🎤 Setlist</h2>

        <div id="listaSetlist">

            <p class="vacio">

                No hay canciones.

            </p>

        </div>

        <div class="acciones-setlist">

            <button id="btnLimpiarSet">

                🗑 Limpiar

            </button>

        </div>

    </aside>

</div>

    </section>

</main>

    <!-- Scripts -->
     <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <script src="data/villera.js"></script>
    <script src="data/con_sabor.js"></script>
    <script src="data/chicha_surena.js"></script>
    <script src="data/folclore.js"></script>
    <script src="data/clasica.js"></script>
    <!-- Aplicación -->
    <script src="js/storage.js"></script>
    <script src="js/repertorios.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/canciones.js"></script>
    <script src="js/exportar.js"></script>
    <script src="js/grupos.js"></script>
    <script src="js/app.js"></script>

    <div id="exportarImagen" style="display:none;"></div>

</body>

</html>
